<style>
  :root{
    --parchment:#FBF3DF;
    --parchment-deep:#F3E8CA;
    --ink:#1E2A3C;
    --sky:#2E97D4;
    --sky-deep:#1E6FA6;
    --coral:#FF6F59;
    --coral-deep:#E5503B;
    --gold:#C9972B;
    --green-ok:#3F9142;
    --red-no:#C43B3B;
    --paper-line: rgba(30,42,60,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      repeating-linear-gradient(180deg, transparent 0 38px, var(--paper-line) 38px 39px),
      var(--parchment);
    color:var(--ink);
    font-family:'Figtree', sans-serif;
    min-height:100vh;
  }
  .ar{ font-family:'Cairo', sans-serif; direction:rtl; }
  h1,h2,h3,.display{ font-family:'Fraunces', serif; }

  /* ===== Top passport strip ===== */
  header.cover{
    background:linear-gradient(135deg, var(--sky-deep), var(--sky) 60%, var(--coral));
    padding:22px 16px 60px;
    position:relative;
    overflow:hidden;
  }
  header.cover::after{
    content:"";
    position:absolute; inset:0;
    background-image: radial-gradient(circle at 12% 20%, rgba(255,255,255,0.14) 0, transparent 40%),
                       radial-gradient(circle at 85% 75%, rgba(255,255,255,0.10) 0, transparent 45%);
  }
  .cover-inner{
    position:relative; z-index:1;
    max-width:1080px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  .brand{ display:flex; align-items:center; gap:14px; color:#fff; }
  .brand .stamp-logo{
    width:56px; height:56px; border-radius:50%;
    border:3px solid rgba(255,255,255,0.85);
    display:flex; align-items:center; justify-content:center;
    font-size:26px; background:rgba(255,255,255,0.12);
    transform:rotate(-8deg);
  }
  .brand-text .eyebrow{ letter-spacing:.14em; text-transform:uppercase; font-size:12px; opacity:.85; font-weight:700;}
  .brand-text h1{ margin:2px 0 0; font-size:26px; font-weight:700; line-height:1.1;}
  .brand-text .ar{ font-size:14px; opacity:.9; margin-top:2px;}

  .passport-meta{ color:#fff; text-align:right; font-size:13px; opacity:.9; }
  .passport-meta b{ display:block; font-size:22px; font-family:'Fraunces',serif; }

  nav.tabs{
    max-width:1080px; margin:-40px auto 0; padding:0 16px;
    position:relative; z-index:2;
  }
  .tabs-scroll{
    display:flex; gap:10px; overflow-x:auto; padding:10px 4px 18px;
    scrollbar-width:none;
  }
  .tabs-scroll::-webkit-scrollbar{ display:none; }
  .tab-btn{
    flex:0 0 auto;
    background:#fff; border:2px solid var(--parchment-deep);
    border-radius:16px; padding:10px 14px;
    display:flex; align-items:center; gap:8px;
    cursor:pointer; font-weight:700; font-size:13.5px; color:var(--ink);
    box-shadow:0 4px 10px rgba(30,42,60,0.10);
    transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    white-space:nowrap;
  }
  .tab-btn:hover{ transform:translateY(-2px); box-shadow:0 8px 16px rgba(30,42,60,0.16); }
  .tab-btn.active{ border-color:var(--coral); background:linear-gradient(180deg,#fff,#FFF3EF); }
  .tab-icon{ font-size:18px; }
  .tab-stamp{
    width:18px; height:18px; border-radius:50%; background:var(--green-ok);
    color:#fff; font-size:11px; display:flex; align-items:center; justify-content:center;
    font-weight:800; flex:0 0 auto;
  }

  main{ max-width:880px; margin:0 auto; padding:8px 16px 80px; }

  /* ===== Home / passport page ===== */
  .home-card{
    background:#fff; border-radius:22px; padding:28px 24px;
    box-shadow:0 10px 30px rgba(30,42,60,0.10);
    border:1px solid var(--parchment-deep);
  }
  .home-card h2{ font-size:26px; margin:0 0 6px; }
  .home-card p.lead{ margin:0 0 20px; color:#45536b; line-height:1.6; }
  .stamp-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:14px; margin-top:8px; }
  .stamp-slot{
    border:2px dashed #cbb98a; border-radius:16px; padding:16px 10px; text-align:center;
    background:repeating-linear-gradient(135deg, transparent 0 8px, rgba(201,151,43,0.05) 8px 16px);
    transition:all .2s ease; cursor:pointer;
  }
  .stamp-slot:hover{ border-color:var(--sky); }
  .stamp-slot.done{ border-style:solid; border-color:var(--green-ok); background:#F1FBF1; }
  .stamp-slot .ic{ font-size:28px; display:block; margin-bottom:6px; }
  .stamp-slot .lbl{ font-weight:700; font-size:12.5px; }
  .stamp-slot .score{ font-size:11px; color:var(--green-ok); font-weight:700; margin-top:4px;}

  /* ===== Unit layout ===== */
  .unit{ background:#fff; border-radius:22px; padding:26px 24px 30px; box-shadow:0 10px 30px rgba(30,42,60,0.10); border:1px solid var(--parchment-deep); }
  .unit-head{ display:flex; align-items:flex-start; gap:14px; margin-bottom:16px; }
  .unit-head .badge{
    width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg,var(--sky),var(--sky-deep));
    display:flex; align-items:center; justify-content:center; font-size:22px; color:#fff; flex:0 0 auto;
  }
  .unit-head.conv .badge{ background:linear-gradient(135deg,var(--coral),var(--coral-deep)); }
  .unit-head h2{ margin:0; font-size:22px; }
  .unit-head .kicker{ text-transform:uppercase; letter-spacing:.1em; font-size:11.5px; font-weight:800; color:var(--sky-deep); }
  .unit-head.conv .kicker{ color:var(--coral-deep); }
  .unit-head .ar-title{ font-size:13.5px; color:#5b6b84; margin-top:2px; }

  .hint-bar{
    display:flex; align-items:center; gap:8px; background:#EFF7FC; border:1px solid #d9edf9;
    padding:8px 12px; border-radius:12px; font-size:13px; color:#2b5a78; margin-bottom:16px;
  }

  .passage{ font-size:16.5px; line-height:1.9; }
  .passage p{ margin:0 0 14px; }
  .vocab-word{
    color:var(--coral-deep); font-weight:700; border-bottom:2px dotted var(--coral-deep);
    cursor:pointer; padding:0 1px; position:relative;
  }
  .vocab-word:hover{ background:#FFF1EE; border-radius:4px; }
  .vocab-word.playing{ background:#FFE1DA; }

  .line{ margin:0 0 14px; display:flex; gap:10px; }
  .line .speaker{ font-weight:800; color:var(--sky-deep); flex:0 0 auto; min-width:64px; }

  .popup{
    position:fixed; z-index:50; background:var(--ink); color:#fff; padding:10px 14px;
    border-radius:12px; font-size:13.5px; max-width:240px; box-shadow:0 8px 20px rgba(0,0,0,0.25);
    display:none; pointer-events:none;
  }
  .popup .en{ font-weight:700; margin-bottom:2px; }
  .popup .ar{ font-size:14px; color:#FFE1B8; }
  .popup:after{ content:""; position:absolute; bottom:-6px; left:20px; width:12px; height:12px; background:var(--ink); transform:rotate(45deg); }

  .section-title{ font-family:'Fraunces',serif; font-size:18px; margin:26px 0 10px; display:flex; align-items:center; gap:8px;}
  .section-title .dot{ width:8px; height:8px; border-radius:50%; background:var(--gold); }

  .vocab-list{ display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
  .vocab-chip{
    background:var(--parchment); border:1px solid var(--parchment-deep); border-radius:12px;
    padding:10px 12px; cursor:pointer; transition:transform .12s ease;
  }
  .vocab-chip:hover{ transform:translateY(-2px); }
  .vocab-chip .w{ font-weight:800; color:var(--sky-deep); }
  .vocab-chip .a{ font-size:13.5px; color:#5b6b84; margin-top:2px; }

  .quiz{ margin-top:8px; }
  .q-item{ background:var(--parchment); border:1px solid var(--parchment-deep); border-radius:14px; padding:14px 16px; margin-bottom:12px; }
  .q-item .q-text{ font-weight:700; margin-bottom:10px; }
  .opt{ display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:10px; cursor:pointer; margin-bottom:4px; }
  .opt:hover{ background:#fff; }
  .opt input{ accent-color:var(--sky-deep); }
  .opt.correct{ background:#E6F6E6; font-weight:700; }
  .opt.wrong{ background:#FBE6E4; text-decoration:line-through; }

  .check-btn{
    background:linear-gradient(135deg,var(--coral),var(--coral-deep)); color:#fff; border:none;
    padding:12px 22px; border-radius:14px; font-weight:800; font-size:15px; cursor:pointer;
    box-shadow:0 6px 14px rgba(229,80,59,0.35); margin-top:8px;
  }
  .check-btn:hover{ filter:brightness(1.05); }
  .result-banner{
    margin-top:14px; padding:14px 16px; border-radius:14px; font-weight:800; display:none;
    align-items:center; gap:10px;
  }
  .result-banner.show{ display:flex; }
  .result-banner.good{ background:#E6F6E6; color:var(--green-ok); }
  .result-banner.mid{ background:#FFF3D9; color:var(--gold); }
  .result-banner.low{ background:#FBE6E4; color:var(--red-no); }

  .nav-footer{ display:flex; justify-content:space-between; margin-top:22px; }
  .foot-btn{
    background:#fff; border:2px solid var(--parchment-deep); border-radius:12px; padding:10px 16px;
    font-weight:700; cursor:pointer; color:var(--ink);
  }
  .foot-btn:hover{ border-color:var(--sky); }

  footer.sign{ text-align:center; padding:26px 16px 40px; color:#7a8aa3; font-size:12.5px; }
  footer.sign .ar{ font-size:12.5px; }

  @media (max-width:600px){
    .brand-text h1{ font-size:21px; }
    .unit{ padding:20px 16px 24px; }
    .line{ flex-direction:column; gap:2px; }
    .line .speaker{ min-width:auto; }
  }
</style>
</head>

/* ================= STATE ================= */
const state = { current:'home', results:{} };

/* ================= RENDER TABS ================= */
function renderTabs(){
  const wrap = document.getElementById('tabsScroll');
  let html = `<div class="tab-btn ${state.current==='home'?'active':''}" data-id="home">
                <span class="tab-icon">🏠</span> Home</div>`;
  UNITS.forEach(u=>{
    const done = state.results[u.id];
    html += `<div class="tab-btn ${state.current===u.id?'active':''}" data-id="${u.id}">
        <span class="tab-icon">${u.icon}</span> ${u.title}
        ${done? '<span class="tab-stamp">✓</span>':''}
      </div>`;
  });
  html += `<div class="tab-btn ${state.current==='vocab'?'active':''}" data-id="vocab">
              <span class="tab-icon">📖</span> Vocabulary Bank</div>`;
  wrap.innerHTML = html;
  wrap.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ state.current = btn.dataset.id; render(); window.scrollTo({top:0, behavior:'smooth'}); });
  });
}

/* ================= SPEECH + POPUP ================= */
function speakAndShow(el){
  const en = el.dataset.en, ar = el.dataset.ar;
  document.getElementById('popupEn').textContent = en;
  document.getElementById('popupAr').textContent = ar;
  const pop = document.getElementById('popup');
  const rect = el.getBoundingClientRect();
  pop.style.left = Math.max(10, rect.left) + 'px';
  pop.style.top = (rect.top - 64 + window.scrollY) + 'px';
  pop.style.display = 'block';
  clearTimeout(window._popTimer);
  window._popTimer = setTimeout(()=>{ pop.style.display='none'; }, 2600);

  document.querySelectorAll('.vocab-word.playing').forEach(x=>x.classList.remove('playing'));
  el.classList.add('playing');

  if('speechSynthesis' in window){
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(en);
    u.lang = 'en-US';
    u.rate = 0.88;
    u.onend = ()=> el.classList.remove('playing');
    window.speechSynthesis.speak(u);
  }
}

function attachVocabHandlers(container){
  container.querySelectorAll('.vocab-word').forEach(el=>{
    el.addEventListener('click', ()=> speakAndShow(el));
  });
}

/* ================= RENDER HOME ================= */
function renderHome(){
  const doneCount = Object.keys(state.results).length;
  document.getElementById('progressCount').textContent = doneCount + ' / 8';
  let stamps = UNITS.map(u=>{
    const r = state.results[u.id];
    return `<div class="stamp-slot ${r?'done':''}" data-id="${u.id}">
      <span class="ic">${u.icon}</span>
      <div class="lbl">${u.title}</div>
      ${r? `<div class="score">${r.score}/${r.total} ✓</div>` : '<div class="score" style="color:#a99a6b;">Not started</div>'}
    </div>`;
  }).join('');

  return `
  <div class="home-card">
    <div class="eyebrow" style="color:var(--sky-deep); font-weight:800; letter-spacing:.1em; text-transform:uppercase; font-size:12px;">Your Passport</div>
    <h2>Welcome to your world tour of English 🌍</h2>
    <p class="lead">Collect a stamp for every reading and conversation you complete. Tap any coloured word inside a lesson to hear it spoken aloud and see its Arabic meaning.<br>
    <span class="ar">اضغط على أي وحدة من الوحدات الثمانية أدناه لبدء الدرس، واجمع ختمًا لكل درس تُنهيه.</span></p>
    <div class="stamp-grid">${stamps}</div>
  </div>`;
}

/* ================= RENDER VOCAB BANK ================= */
function renderVocabBank(){
  let all = [];
  UNITS.forEach(u=> u.vocab.forEach(v=> all.push(v)));
  let chips = all.map(v=>`<div class="vocab-chip vocab-word" data-en="${v[0]}" data-ar="${v[1]}">
      <div class="w">${v[0]}</div><div class="a ar">${v[1]}</div>
    </div>`).join('');
  return `<div class="unit">
    <div class="unit-head"><div class="badge">📖</div>
      <div><div class="kicker">Full word list</div><h2>Vocabulary Bank</h2>
      <div class="ar-title ar">كل كلمات الدرس في مكان واحد — اضغط لسماع النطق والمعنى</div></div>
    </div>
    <div class="vocab-list">${chips}</div>
  </div>`;
}

/* ================= RENDER UNIT ================= */
function renderUnit(u){
  const isConv = u.type === 'conversation';
  let bodyHtml = '';
  if(isConv){
    bodyHtml = u.lines.map(l=>`<div class="line"><span class="speaker">${l[0]}:</span><span>${md(l[1])}</span></div>`).join('');
  } else {
    bodyHtml = u.paragraphs.map(p=>`<p>${md(p)}</p>`).join('');
  }

  const vocabHtml = u.vocab.map(v=>`<div class="vocab-chip vocab-word" data-en="${v[0]}" data-ar="${v[1]}">
      <div class="w">${v[0]}</div><div class="a ar">${v[1]}</div>
    </div>`).join('');

  const qHtml = u.questions.map((q,qi)=>{
    const opts = q.opts.map((o,oi)=>`
      <label class="opt" data-qi="${qi}" data-oi="${oi}">
        <input type="radio" name="q${qi}" value="${oi}"> <span>${o}</span>
      </label>`).join('');
    return `<div class="q-item" data-qi="${qi}">
        <div class="q-text">${qi+1}. ${q.q}</div>
        ${opts}
      </div>`;
  }).join('');

  const idx = UNITS.findIndex(x=>x.id===u.id);
  const prev = UNITS[idx-1], next = UNITS[idx+1];

  return `<div class="unit">
    <div class="unit-head ${isConv?'conv':''}">
      <div class="badge">${u.icon}</div>
      <div>
        <div class="kicker">${u.kicker} · ${isConv?'Conversation':'Reading'}</div>
        <h2>${u.title}</h2>
        <div class="ar-title ar">${u.arTitle}</div>
      </div>
    </div>
    <div class="hint-bar">🔊 <span>Tap any <b style="color:var(--coral-deep)">coloured word</b> to hear it and see its Arabic meaning.</span></div>
    <div class="passage">${bodyHtml}</div>

    <div class="section-title"><span class="dot"></span>Key Vocabulary</div>
    <div class="vocab-list">${vocabHtml}</div>

    <div class="section-title"><span class="dot"></span>Quiz — check your understanding</div>
    <div class="quiz" id="quizArea">${qHtml}</div>
    <button class="check-btn" id="checkBtn">Check my answers</button>
    <div class="result-banner" id="resultBanner"></div>

    <div class="nav-footer">
      <button class="foot-btn" ${prev?'':'disabled style="visibility:hidden"'} id="prevBtn">← ${prev? prev.title : ''}</button>
      <button class="foot-btn" ${next?'':'disabled style="visibility:hidden"'} id="nextBtn">${next? next.title : ''} →</button>
    </div>
  </div>`;
}

/* ================= MAIN RENDER ================= */
function render(){
  renderTabs();
  const main = document.getElementById('mainArea');
  if(state.current === 'home'){
    main.innerHTML = renderHome();
    main.querySelectorAll('.stamp-slot').forEach(s=>{
      s.addEventListener('click', ()=>{ state.current = s.dataset.id; render(); window.scrollTo({top:0,behavior:'smooth'}); });
    });
    return;
  }
  if(state.current === 'vocab'){
    main.innerHTML = renderVocabBank();
    attachVocabHandlers(main);
    return;
  }
  const u = UNITS.find(x=>x.id===state.current);
  if(!u){ state.current='home'; render(); return; }
  main.innerHTML = renderUnit(u);
  attachVocabHandlers(main);

  // option selection styling
  main.querySelectorAll('.opt').forEach(o=>{
    o.addEventListener('click', ()=>{
      const qi = o.dataset.qi;
      main.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(x=>x.querySelector('input').checked = (x===o));
    });
  });

  document.getElementById('checkBtn').addEventListener('click', ()=>{
    let score = 0;
    u.questions.forEach((q,qi)=>{
      const opts = main.querySelectorAll(`.opt[data-qi="${qi}"]`);
      let chosen = -1;
      opts.forEach((o,oi)=>{ if(o.querySelector('input').checked) chosen = oi; });
      opts.forEach((o,oi)=>{
        o.classList.remove('correct','wrong');
        if(oi === q.c) o.classList.add('correct');
        else if(oi === chosen) o.classList.add('wrong');
      });
      if(chosen === q.c) score++;
    });
    state.results[u.id] = { score, total: u.questions.length };
    const banner = document.getElementById('resultBanner');
    banner.classList.add('show');
    banner.classList.remove('good','mid','low');
    const pct = score / u.questions.length;
    let msg;
    if(pct === 1){ banner.classList.add('good'); msg = `🎉 Perfect! ${score}/${u.questions.length} — passport stamp earned!`; }
    else if(pct >= 0.6){ banner.classList.add('mid'); msg = `👍 Good job — ${score}/${u.questions.length}. Review the passage and try again for a perfect score.`; }
    else { banner.classList.add('low'); msg = `📖 ${score}/${u.questions.length} — re-read the passage above, then try once more.`; }
    banner.textContent = msg;
    renderTabs();
  });

  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const idx = UNITS.findIndex(x=>x.id===u.id);
  if(prevBtn && UNITS[idx-1]) prevBtn.addEventListener('click', ()=>{ state.current = UNITS[idx-1].id; render(); window.scrollTo({top:0,behavior:'smooth'}); });
  if(nextBtn && UNITS[idx+1]) nextBtn.addEventListener('click', ()=>{ state.current = UNITS[idx+1].id; render(); window.scrollTo({top:0,behavior:'smooth'}); });
}

render();
</script>
